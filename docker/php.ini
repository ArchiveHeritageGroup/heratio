; Heratio runtime tuning. Mirrors what bin/install applies on a metal install.
memory_limit            = 512M
post_max_size           = 256M
upload_max_filesize     = 256M
max_execution_time      = 300
max_input_time          = 300
max_input_vars          = 5000

date.timezone           = UTC

; OPcache — required for any reasonable Laravel performance
opcache.enable          = 1
opcache.memory_consumption       = 256
opcache.interned_strings_buffer  = 16
opcache.max_accelerated_files    = 20000
opcache.validate_timestamps      = 1
opcache.revalidate_freq          = 0

; Session handling — Laravel manages this in the DB by default; harmless
session.cookie_httponly = 1
session.cookie_samesite = Lax
