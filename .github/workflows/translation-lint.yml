name: Translation lint

# Two checks, guarding the two ways a string can fail to reach a translator.
#
# 1. Hardcoded UI string scan - strings never wrapped in __(), so the
#    multilingual layer (issue #34) can never see them.
# 2. Locale key extraction - strings correctly wrapped in __() but never
#    harvested into lang/en.json. __() falls back to rendering the key, so
#    these display as English with nothing reporting a problem. This is how
#    en.json came to cover only 27% of the interface before #1420.
#
# Tuning the thresholds: bump either when the absolute count has been
# reduced. The point is not to hit zero — it's to ensure new code doesn't
# push the count up.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  # Absolute cap on hardcoded UI string candidates across the codebase.
  # Stood at 61 against a cap of 50 - i.e. permanently red - until the
  # 2026-07-22 sweep wrapped 40 genuine strings and brought it to 22.
  #
  # The remaining 22 are deliberate and should NOT be wrapped: TK/BC Local
  # Contexts codes, MIME types and PRONOM ids (fmt/43), URL and path examples,
  # the literal word RESTORE that a user must type to confirm a restore
  # (translating it would break the comparison), and two linter false positives
  # (a @yield directive, and a string already inside __()). So 22 is the real
  # floor, not a backlog. 30 leaves headroom for new code.
  TOTAL_THRESHOLD: 30

  # Absolute cap on __() keys present in code but missing from lang/en.json.
  # #1420 harvested 13,955 keys and took this to 0; it has since drifted to
  # ~64. Set to 100 for headroom, and ratchet down as the backlog clears.
  EXTRACT_THRESHOLD: 100

jobs:
  lint:
    name: Hardcoded UI string scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, json, dom, libxml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Run translation lint
        id: lint
        run: |
          set -o pipefail
          # Capture full output so we can post a comment on PRs
          php artisan ahg:translation-lint --top=20 \
              --fail-above=$TOTAL_THRESHOLD \
              | tee lint-output.txt
          # Capture totals from the line "Found N candidate hardcoded UI strings in M files"
          if grep -qE 'Found ([0-9]+) candidate' lint-output.txt; then
            count=$(grep -oE 'Found [0-9]+' lint-output.txt | head -1 | awk '{print $2}')
            files=$(grep -oE 'in [0-9]+ files' lint-output.txt | head -1 | awk '{print $2}')
            echo "count=${count}" >> $GITHUB_OUTPUT
            echo "files=${files}" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR with lint summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('lint-output.txt', 'utf8');
            const count = '${{ steps.lint.outputs.count }}';
            const threshold = process.env.TOTAL_THRESHOLD;
            const status = parseInt(count) > parseInt(threshold) ? '❌ FAIL' : '✅ OK';
            const body = [
              '### Translation lint ' + status,
              '',
              `Hardcoded UI strings: **${count}** (threshold: ${threshold})`,
              '',
              '<details><summary>Top files (click to expand)</summary>',
              '',
              '```',
              output.substring(0, 4000),
              '```',
              '',
              '</details>',
              '',
              '_To fix: wrap user-visible strings in `{{ __(\'…\') }}` (Blade) or `__(\'…\')` (PHP)._',
              '_To bump threshold: edit `.github/workflows/translation-lint.yml` `TOTAL_THRESHOLD`._'
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
        env:
          TOTAL_THRESHOLD: ${{ env.TOTAL_THRESHOLD }}

  extract:
    name: Locale key extraction
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, json, dom, libxml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Check for __() keys missing from lang/en.json
        run: |
          set -o pipefail
          # --dry-run so CI never writes the locale file; the command exits
          # non-zero when the missing count exceeds the threshold.
          if ! php artisan ahg:translation-extract \
                 --dry-run \
                 --top=15 \
                 --fail-above=$EXTRACT_THRESHOLD \
                 | tee extract-output.txt; then
            echo ""
            echo "::error::Translation keys exist in the codebase but are missing from lang/en.json."
            echo "These strings render as English because __() falls back to the key, and no"
            echo "translator can reach them. Run: php artisan ahg:translation-extract"
            echo "Then commit the updated lang/en.json."
            echo "To raise the cap instead, edit EXTRACT_THRESHOLD in this workflow."
            exit 1
          fi
