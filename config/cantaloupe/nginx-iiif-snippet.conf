# =============================================================================
# nginx snippet - proxy /iiif/ to local Cantaloupe
# =============================================================================
# Add INSIDE your existing Heratio server { ... } block. The ^~ prefix is
# critical: it stops nginx's static-file regex (e.g. \.(jpg|png)$ at the bottom
# of the vhost) from intercepting tile requests. Without ^~ the regex location
# wins and tiles return 404.
# =============================================================================

# Laravel passthroughs that share the /iiif/ prefix with Cantaloupe.
# Longer ^~ prefixes and = exact matches win over the broader ^~ /iiif/
# block below, so these stay on the Laravel app.
# Refs: issue #733, #695 Change Discovery, #696 Auth 2.0 + Content State,
# #699 workspace admin.
location = /iiif/discovery/changes { try_files $uri /index.php?$query_string; }
location ^~ /iiif/auth/2/          { try_files $uri /index.php?$query_string; }
location ^~ /iiif/content-state/   { try_files $uri /index.php?$query_string; }
location = /iiif/workspaces        { try_files $uri /index.php?$query_string; }

location ^~ /iiif/ {
    proxy_pass http://127.0.0.1:{{HTTP_PORT}}/iiif/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    # IIIF auth: forward cookies + Authorization to delegates.rb authorize()
    proxy_set_header Cookie            $http_cookie;
    proxy_set_header Authorization     $http_authorization;

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # CORS for cross-origin viewers (Mirador, OpenSeadragon embeds)
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization" always;

    # Tile cache — Cantaloupe handles this internally too
    proxy_buffering on;
    proxy_cache_valid 200 30d;
}
