; Heratio per-application PHP overrides (read by PHP-FPM for the public/ docroot).
;
; PHP ships upload_max_filesize=2M / post_max_size=8M by default, which is far
; too small for GLAM digital objects (high-res TIFF/JP2, audio, video, 3D
; models) — uploads failed with "The maximum size of file uploads is 2 MB".
; upload_max_filesize and post_max_size are PHP_INI_PERDIR, so they can be set
; here without touching system php.ini, and this file ships in the repo so every
; install gets it automatically. nginx is already client_max_body_size 2G in the
; vhost template, so PHP was the only limit.
;
; Raise these (and/or memory_limit) further for very large masters. Changes take
; effect within user_ini.cache_ttl (300s) or immediately after a php-fpm reload.

upload_max_filesize = 2G
post_max_size = 2G
max_file_uploads = 50
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
