# ============================================================================
# SANITIZED reference copy of the live heratio nginx vhost.
#
# Source of truth: /etc/nginx/sites-enabled/heratio.theahg.co.za.conf
# Tracked in git for change history. Per the no-AHG-server-exposure rule, the
# internal upstream service addresses are REDACTED to placeholders:
#   UPSTREAM_RIC_FLASK  = the local OpenRiC/Flask RiC service (host:port redacted)
#   UPSTREAM_IIIF       = the local Cantaloupe IIIF image server (host:port redacted)
# Restore the real loopback host:port from the live config when deploying.
# Update this file after each live nginx add/edit.
# ============================================================================

##
# Heratio – heratio.theahg.co.za (Pure Laravel archival platform)
# Created: 2026-03-06
##

server {
    listen 80;
    listen [::]:80;
    server_name heratio.theahg.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heratio.theahg.co.za;

    client_max_body_size 2G;

    root /usr/share/nginx/heratio/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/theahg.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theahg.co.za/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/theahg.ddns.net/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/heratio_access.log;
    error_log  /var/log/nginx/heratio_error.log;

    # ======================================
    # SECURITY HEADERS
    # ======================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ======================================
    # BOT PROTECTION (uses maps from conf.d)
    # ======================================
    set $block_bot 0;
    if ($bad_bot) {
        set $block_bot 1;
    }
    if ($api_bypass) {
        set $block_bot 0;
    }
    if ($block_bot) {
        return 444;
    }

    if ($blocked_ip) {
        return 403;
    }

    # ======================================
    # BLOCK COMMON PHP EXPLOIT SCANNERS
    # ======================================
    location ~* (eval-stdin\.php|phpunit|pearcmd|thinkphp|invokefunction|\.env|\.git|shell|cmd) {
        return 444;
    }

    if ($query_string ~* "allow_url_include" ) { return 444; }
    if ($query_string ~* "auto_prepend_file" ) { return 444; }

    # ======================================
    # BLOCK PATH TRAVERSAL
    # ======================================
    if ($request_uri ~ "\.\./") { return 444; }
    if ($request_uri ~ "\.%2e%2e/") { return 444; }

    # ======================================
    # DIGITAL OBJECT UPLOADS (same NAS mount as AtoM)
    # ======================================
    location ^~ /uploads/condition_photos/ {
        alias /mnt/nas/heratio/uploads/condition_photos/;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location ^~ /uploads/ {
        alias /mnt/nas/heratio/uploads/;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ======================================
    # GENERIC ICONS (digital object placeholders)
    # ======================================
    location /generic-icons/ {
        alias /usr/share/nginx/archive/images/generic-icons/;
    }

    # ======================================
    # RiC EXPLORER STATIC ASSETS (Flask — must be before generic static rule)
    # ======================================
    location ^~ /static/ {
        proxy_pass http://UPSTREAM_RIC_FLASK;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ======================================
    # STATIC ASSETS (Heratio/Laravel)
    # ======================================
    location ~* \.(css|js|map|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|pdf|wasm|glb|gltf|bin|splat|ksplat|drc|ktx2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # wasm/glb/etc. must be matched here (before the /vendor deny below) so the
        # self-hosted three.js Draco/Basis decoders + 3D models under /vendor are served.
        try_files $uri =404;
    }

    # ======================================
    # IIIF (Cantaloupe proxy)
    # ======================================
    # Laravel passthroughs that share the /iiif/ prefix with Cantaloupe.
    # Longer ^~ prefixes and = exact matches win over the broader
    # ^~ /iiif/ block below, so these stay on the Laravel app.
    # Refs: issue #733, #695 Change Discovery, #696 Auth 2.0 + Content State,
    # #699 workspace admin.
    location = /iiif/discovery/changes { try_files $uri /index.php?$query_string; }
    location ^~ /iiif/auth/2/          { try_files $uri /index.php?$query_string; }
    location ^~ /iiif/content-state/   { try_files $uri /index.php?$query_string; }
    location = /iiif/workspaces        { try_files $uri /index.php?$query_string; }
    # #1180 3D model IIIF manifests are served by Laravel, not Cantaloupe.
    location ^~ /iiif/3d/              { try_files $uri /index.php?$query_string; }

    location ^~ /iiif/ {
        proxy_pass http://UPSTREAM_IIIF/iiif/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin "*" always;

        sub_filter_types application/json application/ld+json;
        sub_filter_once off;
        sub_filter 'http://UPSTREAM_IIIF' 'https://$host';
    }

    # ======================================
    # SECURITY — BLOCK HIDDEN FILES
    # ======================================
    location ~ /\.(ht|git|svn|env) {
        deny all;
    }

    # ======================================
    # SECURITY — BLOCK SOURCE / CONFIG / DATABASE / DOC FILES
    # 2026-04-30: added after Playwright security spec found composer.json,
    # CLAUDE.md, database/seeds/*.sql were publicly readable.
    # ======================================
    location = /composer.json    { deny all; }
    location = /composer.lock    { deny all; }
    location = /package.json     { deny all; }
    location = /package-lock.json { deny all; }
    location = /CLAUDE.md        { deny all; }
    location = /README.md        { deny all; }
    location ~ ^/\.env(\.|$)     { deny all; }

    # Article attachments (guides & templates) live under storage/app/public and
    # are exposed via the /storage symlink. The blanket /storage deny below would
    # block office/zip downloads (PDF + images slip through the static-asset
    # regex, but .docx/.xlsx/.zip etc. fall through to deny all -> 403). Allow
    # this one public sub-tree and force download. Must precede the deny.
    location ^~ /storage/blog-files/ {
        alias /usr/share/nginx/heratio/storage/app/public/blog-files/;
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    location ~ ^/(?:vendor|storage|database|config|bootstrap|tests|node_modules)/ { deny all; }
    location ~ \.(env|sql|log|yml|yaml|lock|json5|cache)$ { deny all; }
    location ~ \.md$ {
        # Allow markdown UNDER /uploads (user content) only.
        if ($uri !~ ^/uploads/) { return 403; }
    }

    # ======================================
    # RiC EXPLORER (Flask on port 5055)
    # ======================================
    location /explorer {
        proxy_pass http://UPSTREAM_RIC_FLASK;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # RiC API routes handled by Laravel (data, view-mode, relations, graph, timeline, explain, connections)
    location /ric-api/data         { try_files $uri /index.php?$query_string; }
    location /ric-api/view-mode    { try_files $uri /index.php?$query_string; }
    location /ric-api/relations    { try_files $uri /index.php?$query_string; }
    location /ric-api/graph-summary { try_files $uri /index.php?$query_string; }
    location /ric-api/timeline     { try_files $uri /index.php?$query_string; }
    location /ric-api/explain      { try_files $uri /index.php?$query_string; }
    # heratio#1197 - the unified cross-collection connections endpoint is a Laravel
    # route (RicController::connectionsData); without this it fell through to the
    # Flask catch-all below, which has no /connections route and 502'd at 15s.
    location /ric-api/connections  { try_files $uri /index.php?$query_string; }

    # Remaining ric-api routes → Flask (search, stats, autocomplete, resolve-names)
    location /ric-api {
        proxy_pass http://UPSTREAM_RIC_FLASK;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sparql {
        proxy_pass http://UPSTREAM_RIC_FLASK;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ======================================
    # LARAVEL ENTRY POINT
    # ======================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }
}
