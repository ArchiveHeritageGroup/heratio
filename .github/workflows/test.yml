name: Heratio Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - feature
          - critical
          - packages
          - e2e

env:
  COVERAGE_MIN_APP: 50
  COVERAGE_MIN_PACKAGES: 30
  COVERAGE_MIN_CHANGED: 60
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: heratio_test
  DB_USERNAME: root
  DB_PASSWORD: root
  DB_SOCKET: ""
  APP_ENV: testing
  CACHE_DRIVER: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync
  HERATIO_URL: https://heratio.theahg.co.za
  PSIS_URL: https://psis.theahg.co.za

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, bcmath
          coverage: none
      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing
          # PDO MySQL treats DB_HOST=localhost as "use the unix socket" even
          # when DB_SOCKET is blank, falling back to the missing default
          # /var/run/mysqld/mysqld.sock on the runner. Force TCP via 127.0.0.1.
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env.testing
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.testing
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=heratio_test|" .env.testing
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=root|" .env.testing
      - run: composer install --no-interaction --prefer-dist
      - name: PHP Syntax Check
        # Per-file `php -l`. Any non-zero exit fails the job. The previous
        # implementation piped to `grep -v "No syntax errors"` which silently
        # passed when there were no errors (grep returns 1 on no match) and
        # could mask broken syntax depending on shell pipefail settings.
        run: |
          find app packages -name "*.php" \
              -not -name "*.blade.php" \
              -not -path '*/vendor/*' \
              -not -path '*/worktree/*' \
              -print0 | xargs -0 -n1 -P4 php -l > /dev/null

  laravel-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heratio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, bcmath
          coverage: pcov
      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing
          # PDO MySQL treats DB_HOST=localhost as "use the unix socket" even
          # when DB_SOCKET is blank, falling back to the missing default
          # /var/run/mysqld/mysqld.sock on the runner. Force TCP via 127.0.0.1.
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env.testing
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.testing
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=heratio_test|" .env.testing
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=root|" .env.testing
      - run: composer install --no-interaction --prefer-dist
      - name: Create database + load core schema
        # bin/install Stage 6 loads database/core/0[0-3]_*.sql against a fresh
        # database. Tests need the same ~995 tables (object, information_object,
        # actor, term, slug, ...) — without this load, Feature/Package tests
        # explode with "Table 'heratio_test.object' doesn't exist".
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS heratio_test;"
          for f in database/core/0*.sql; do
            echo "Loading $f"
            mysql -h 127.0.0.1 -u root -proot heratio_test < "$f"
          done
      - name: Run Unit Tests
        run: |
          php -d pcov.enabled=1 ./vendor/bin/phpunit --testsuite=Unit --colors=always --testdox

  laravel-feature:
    name: Feature Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heratio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, bcmath
          coverage: pcov
      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing
          # PDO MySQL treats DB_HOST=localhost as "use the unix socket" even
          # when DB_SOCKET is blank, falling back to the missing default
          # /var/run/mysqld/mysqld.sock on the runner. Force TCP via 127.0.0.1.
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env.testing
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.testing
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=heratio_test|" .env.testing
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=root|" .env.testing
      - run: composer install --no-interaction --prefer-dist
      - name: Create database + load core schema
        # bin/install Stage 6 loads database/core/0[0-3]_*.sql against a fresh
        # database. Tests need the same ~995 tables (object, information_object,
        # actor, term, slug, ...) — without this load, Feature/Package tests
        # explode with "Table 'heratio_test.object' doesn't exist".
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS heratio_test;"
          for f in database/core/0*.sql; do
            echo "Loading $f"
            mysql -h 127.0.0.1 -u root -proot heratio_test < "$f"
          done
      - name: Run Feature Tests
        run: |
          php -d pcov.enabled=1 ./vendor/bin/phpunit --testsuite=Feature --colors=always --testdox

  coverage-app:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    needs: [laravel-unit, laravel-feature]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heratio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, bcmath
          coverage: pcov
      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing
          # PDO MySQL treats DB_HOST=localhost as "use the unix socket" even
          # when DB_SOCKET is blank, falling back to the missing default
          # /var/run/mysqld/mysqld.sock on the runner. Force TCP via 127.0.0.1.
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env.testing
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.testing
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=heratio_test|" .env.testing
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=root|" .env.testing
      - run: composer install --no-interaction --prefer-dist
      - name: Create database + load core schema
        # bin/install Stage 6 loads database/core/0[0-3]_*.sql against a fresh
        # database. Tests need the same ~995 tables (object, information_object,
        # actor, term, slug, ...) — without this load, Feature/Package tests
        # explode with "Table 'heratio_test.object' doesn't exist".
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS heratio_test;"
          for f in database/core/0*.sql; do
            echo "Loading $f"
            mysql -h 127.0.0.1 -u root -proot heratio_test < "$f"
          done
      - name: Run Tests with Coverage
        run: |
          php -d pcov.enabled=1 ./vendor/bin/phpunit \
            --testsuite="Unit,Feature" \
            --coverage-html=coverage/app \
            --coverage-clover=coverage/app/coverage.xml \
            --colors=always
      - name: Analyze Coverage
        id: coverage
        run: |
          if [ -f coverage/app/coverage.xml ]; then
            COVERAGE=$(php -r "
              \$xml = simplexml_load_file('coverage/app/coverage.xml');
              \$total = \$xml->project->metrics['elements'];
              \$covered = \$xml->project->metrics['covered'];
              if (\$total > 0) {
                echo round((\$covered / \$total) * 100, 2);
              } else {
                echo '0';
              }
            ")
          else
            COVERAGE=0
          fi
          echo "App Coverage: $COVERAGE%"
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
      - name: Check Coverage Threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          if (( $(echo "$COVERAGE < $COVERAGE_MIN_APP" | bc -l) )); then
            echo "ERROR: App coverage ($COVERAGE%) is below minimum ($COVERAGE_MIN_APP%)"
            exit 1
          fi
          echo "App coverage meets threshold"
      - uses: actions/upload-artifact@v4
        with:
          name: app-coverage-report
          path: coverage/app
          retention-days: 14
      - uses: codecov/codecov-action@v4
        with:
          files: coverage/app/coverage.xml
          flags: app
          fail_ci_if_error: true

  critical-path:
    name: Critical Path Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heratio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, bcmath
      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing
          # PDO MySQL treats DB_HOST=localhost as "use the unix socket" even
          # when DB_SOCKET is blank, falling back to the missing default
          # /var/run/mysqld/mysqld.sock on the runner. Force TCP via 127.0.0.1.
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env.testing
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.testing
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=heratio_test|" .env.testing
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=root|" .env.testing
      - run: composer install --no-interaction --prefer-dist
      - name: Create database + load core schema
        # bin/install Stage 6 loads database/core/0[0-3]_*.sql against a fresh
        # database. Tests need the same ~995 tables (object, information_object,
        # actor, term, slug, ...) — without this load, Feature/Package tests
        # explode with "Table 'heratio_test.object' doesn't exist".
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS heratio_test;"
          for f in database/core/0*.sql; do
            echo "Loading $f"
            mysql -h 127.0.0.1 -u root -proot heratio_test < "$f"
          done
      - name: Check CriticalPath Tests
        run: |
          if [ -d tests/CriticalPath ] && [ "$(ls -A tests/CriticalPath/*.php 2>/dev/null)" ]; then
            php ./vendor/bin/phpunit --testsuite=CriticalPath --colors=always --testdox
          else
            echo "No CriticalPath tests found"
            mkdir -p tests/CriticalPath
          fi

  package-tests:
    name: Package Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heratio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, bcmath
          coverage: pcov
      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing
          # PDO MySQL treats DB_HOST=localhost as "use the unix socket" even
          # when DB_SOCKET is blank, falling back to the missing default
          # /var/run/mysqld/mysqld.sock on the runner. Force TCP via 127.0.0.1.
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env.testing
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.testing
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=heratio_test|" .env.testing
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=root|" .env.testing
      - run: composer install --no-interaction --prefer-dist
      - name: Create database + load core schema
        # bin/install Stage 6 loads database/core/0[0-3]_*.sql against a fresh
        # database. Tests need the same ~995 tables (object, information_object,
        # actor, term, slug, ...) — without this load, Feature/Package tests
        # explode with "Table 'heratio_test.object' doesn't exist".
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS heratio_test;"
          for f in database/core/0*.sql; do
            echo "Loading $f"
            mysql -h 127.0.0.1 -u root -proot heratio_test < "$f"
          done
      - name: Discover Package Tests
        run: |
          for dir in packages/*/tests; do
            if [ -d "$dir" ] && [ "$(ls -A $dir/*.php 2>/dev/null)" ]; then
              echo "Found tests in: $dir"
            fi
          done
      - name: Run Package Tests
        # Hard fail. The previous form `|| echo "Package tests may need setup"`
        # silently passed the job whenever phpunit returned non-zero, which
        # made test failures invisible to the release gate. If the suite is
        # genuinely empty, gate this step on a directory-presence check
        # rather than swallowing phpunit's exit code.
        run: |
          php -d pcov.enabled=1 ./vendor/bin/phpunit --testsuite=Package --colors=always --testdox

  changed-files-coverage:
    name: Changed Files Coverage
    runs-on: ubuntu-latest
    needs: [coverage-app]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql
      - name: Get Changed Files
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BASE_REF=${{ github.event.pull_request.base.ref }}
          else
            BASE_REF=origin/main
          fi
          CHANGED=$(git diff --name-only $BASE_REF HEAD | grep '\.php$' || echo "")
          echo "Changed PHP files:"
          echo "$CHANGED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
      - name: Check Changed Files Coverage
        if: steps.changed.outputs.changed != ''
        run: |
          echo "Note: Full changed-file coverage requires detailed coverage mapping"
          echo "Changed files detected - ensure all new code has tests"
          for FILE in ${{ steps.changed.outputs.changed }}; do
            echo "Changed: $FILE"
          done

  playwright-setup:
    name: Playwright Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright
          retention-days: 7

  e2e-discovery:
    name: E2E Discovery
    runs-on: ubuntu-latest
    needs: playwright-setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright
      # actions/upload-artifact tars the cache and round-trip can drop exec
      # bits, leaving chrome-headless-shell EACCES. Restore them and install
      # any missing browsers (Firefox, WebKit) the spec config requires.
      - run: chmod -R +x ~/.cache/ms-playwright 2>/dev/null || true
      - run: npx playwright install --with-deps
      - name: Run Discovery Tests
        # The PSIS crawler hits an external host (psis.theahg.co.za) and is
        # informational — kept tolerant. Heratio crawler + parity scanner
        # gate the release: any failure must fail the workflow.
        run: |
          npx playwright test tests/e2e/00-discovery/psis-crawler.spec.ts --reporter=list || echo "PSIS crawler advisory failure (external host)"
          npx playwright test tests/e2e/00-discovery/heratio-crawler.spec.ts --reporter=list
          npx playwright test tests/e2e/00-discovery/parity-scanner.spec.ts --reporter=list
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discovery-reports
          path: tests/e2e/reports/
          retention-days: 14

  e2e-workflows:
    name: E2E Workflows
    runs-on: ubuntu-latest
    needs: playwright-setup
    # CRUD spec hits the live HERATIO_URL as admin and creates/updates/deletes
    # real records. Restrict to nightly cron + manual dispatch so a push to
    # main never pollutes the public demo.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright
      - run: npx playwright install chromium
      - name: Run Workflow Tests
        # Hard fail on every workflow spec. The previous `|| true` form let
        # broken golden-path flows ship silently. If a spec is intentionally
        # skipped, mark it with `test.skip` in the spec file rather than
        # swallowing exit codes here.
        run: |
          npx playwright test tests/e2e/03-workflows/access-navigation.spec.ts --reporter=list
          npx playwright test tests/e2e/03-workflows/browse-search.spec.ts --reporter=list
          npx playwright test tests/e2e/03-workflows/crud-records.spec.ts --reporter=list
          npx playwright test tests/e2e/04-search/search.spec.ts --reporter=list
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-results
          path: test-results/
          retention-days: 7

  new-package-validation:
    name: New Package Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect New Packages
        id: new-packages
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          BASE_PACKAGES=$(git ls-tree -r --name-only origin/${{ github.event.pull_request.base.ref }} | grep 'packages/[^/]*/composer.json$' | sed 's|/composer.json||' || echo "")
          CURRENT_PACKAGES=$(git ls-tree -r --name-only HEAD | grep 'packages/[^/]*/composer.json$' | sed 's|/composer.json||' || echo "")
          NEW_PACKAGES=""
          for pkg in $CURRENT_PACKAGES; do
            if ! echo "$BASE_PACKAGES" | grep -q "^packages/$pkg$"; then
              NEW_PACKAGES="$NEW_PACKAGES $pkg"
            fi
          done
          echo "New packages detected:$NEW_PACKAGES"
          echo "packages=$NEW_PACKAGES" >> $GITHUB_OUTPUT
      - name: Validate New Packages
        if: steps.new-packages.outputs.packages != ''
        run: |
          for PKG in ${{ steps.new-packages.outputs.packages }}; do
            echo "Validating package: $PKG"
            if [ ! -d "packages/$PKG/tests" ]; then
              echo "ERROR: packages/$PKG/tests/ does not exist"
              exit 1
            fi
            if [ ! -f "packages/$PKG/tests/TestCase.php" ]; then
              echo "ERROR: packages/$PKG/tests/TestCase.php does not exist"
              exit 1
            fi
            echo "Package $PKG has valid test structure"
          done

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [laravel-unit, laravel-feature, critical-path, package-tests, coverage-app]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Heratio Test Suite Results"
          echo "Unit Tests: ${{ needs.laravel-unit.result }}"
          echo "Feature Tests: ${{ needs.laravel-feature.result }}"
          echo "Critical Path: ${{ needs.critical-path.result }}"
          echo "Package Tests: ${{ needs.package-tests.result }}"
          echo "Coverage: ${{ needs.coverage-app.result }}"
