server {
    listen 80 default_server;
    server_name _;

    root /var/www/heratio/public;
    index index.php;

    client_max_body_size 256M;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    access_log /dev/stdout;
    error_log  /dev/stderr;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param           SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffers         16 32k;
        fastcgi_buffer_size     32k;
    }

    # Long-cached assets built by `npm run build` land in /build/
    location ~* ^/build/.*\.(js|css|woff2?|svg|png|jpg|webp)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Block direct access to internals
    location ~ /\.(?!well-known) { deny all; }
    location ~ /(storage|bootstrap|vendor|config)/ { deny all; }
}
