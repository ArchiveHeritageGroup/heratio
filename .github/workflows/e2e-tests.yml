name: E2E Parity Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run every night at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - discovery
          - workflows
          - api

env:
  HERATIO_URL: https://heratio.theahg.co.za
  PSIS_URL: https://psis.theahg.co.za
  DB_CONNECTION: mysql
  DB_DATABASE: heratio_test
  CACHE_DRIVER: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync

jobs:
  # ===========================================================================
  # LARAVEL TESTS
  # ===========================================================================
  laravel-tests:
    name: Laravel Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: heratio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # Heratio targets PHP 8.3 (per CLAUDE.md). spatie/laravel-csp 3.23+
          # and maennchen/zipstream-php 3.2+ both require ^8.3.
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, xml, gd, zip, intl, bcmath
          coverage: none

      - name: Prepare .env.testing (copy template, blank placeholders)
        run: |
          cp .env.testing.example .env.testing
          sed -i "s|<<set in your local .env.testing>>||g" .env.testing
          sed -i "s|^DB_SOCKET=.*|DB_SOCKET=|" .env.testing

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create testing database
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS heratio_test;"

      - name: Run Laravel tests
        run: php artisan test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laravel-test-results
          path: test-results/
          retention-days: 7

  # ===========================================================================
  # PLAYWRIGHT SETUP
  # ===========================================================================
  playwright-setup:
    name: Playwright Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Set test matrix
        id: set-matrix
        run: |
          # Multi-line var into $GITHUB_OUTPUT requires the EOF heredoc syntax;
          # plain `key=$VAR` only works for single-line values. The previous
          # `echo "matrix=$MATRIX"` form rendered as 4 separate lines and
          # GitHub rejected lines 2-4 as "Invalid format".
          {
            echo 'matrix<<MATRIX_EOF'
            cat <<'JSON'
          {
            "browser": ["chromium"],
            "suite": ["all"]
          }
          JSON
            echo 'MATRIX_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload Playwright cache
        uses: actions/upload-artifact@v4
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright
          retention-days: 7

  # ===========================================================================
  # E2E DISCOVERY TESTS
  # ===========================================================================
  e2e-discovery:
    name: E2E Discovery Tests
    runs-on: ubuntu-latest
    needs: playwright-setup
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright cache
        uses: actions/download-artifact@v4
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright

      - name: Restore exec bits on Playwright cache
        run: chmod -R +x ~/.cache/ms-playwright 2>/dev/null || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run PSIS Discovery
        # PSIS is an external reference host; tolerate failures so a PSIS
        # outage doesn't block our release. Heratio's own crawler and the
        # parity scanner are gating.
        run: npx playwright test tests/e2e/00-discovery/psis-crawler.spec.ts --reporter=list || echo "PSIS crawler advisory failure (external host)"

      - name: Run Heratio Discovery
        run: npx playwright test tests/e2e/00-discovery/heratio-crawler.spec.ts --reporter=list

      - name: Run Parity Scanner
        run: npx playwright test tests/e2e/00-discovery/parity-scanner.spec.ts --reporter=list

      - name: Upload discovery reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-reports
          path: tests/e2e/reports/
          retention-days: 14

  # ===========================================================================
  # E2E WORKFLOW TESTS
  # ===========================================================================
  e2e-workflows:
    name: E2E Workflow Tests
    runs-on: ubuntu-latest
    needs: playwright-setup
    # CRUD tests run against the live HERATIO_URL as admin — they create,
    # update and delete real records. Restrict to nightly schedule + manual
    # dispatch so a push to main doesn't pollute the public demo.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright cache
        uses: actions/download-artifact@v4
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright

      - name: Restore exec bits on Playwright cache
        run: chmod -R +x ~/.cache/ms-playwright 2>/dev/null || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Access & Navigation Tests
        run: npx playwright test tests/e2e/03-workflows/access-navigation.spec.ts --reporter=list

      - name: Run Browse & Search Tests
        run: npx playwright test tests/e2e/03-workflows/browse-search.spec.ts --reporter=list

      - name: Run CRUD Tests
        run: npx playwright test tests/e2e/03-workflows/crud-records.spec.ts --reporter=list

      - name: Upload workflow test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-test-results
          path: |
            test-results/
            tests/e2e/artifacts/
          retention-days: 7

  # ===========================================================================
  # GENERATE PARITY REPORT
  # ===========================================================================
  generate-report:
    name: Generate Parity Report
    runs-on: ubuntu-latest
    needs: [e2e-discovery, e2e-workflows]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download discovery reports
        # `ignore-not-found` was rejected as "Unexpected input(s)" by the
        # action version we run on. We get the same effect by adding
        # `continue-on-error: true` — the report-generation step below
        # already handles the absent-file case.
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: discovery-reports
          path: tests/e2e/reports/

      - name: Generate executive summary
        run: |
          echo "=== Parity Test Summary ==="
          echo ""
          
          if [ -f tests/e2e/reports/parity-report.json ]; then
            cat tests/e2e/reports/parity-report.json | jq '.summary'
          else
            echo "No parity report found - discovery tests may have failed"
          fi
          
          echo ""
          echo "=== Artifacts Available ==="
          ls -la tests/e2e/reports/ 2>/dev/null || echo "No reports generated"

      - name: Upload final reports
        uses: actions/upload-artifact@v4
        with:
          name: parity-reports-final
          path: tests/e2e/reports/
          retention-days: 30

  # ===========================================================================
  # NOTIFICATION ON FAILURE
  # ===========================================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [laravel-tests, e2e-discovery, e2e-workflows]
    if: failure() && github.event_name != 'pull_request'
    
    steps:
      - name: Send failure notification
        run: |
          echo "Parity testing failed!"
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Add your notification method here:
          # - Slack webhook
          # - Email
          # - Discord
          # - etc.
