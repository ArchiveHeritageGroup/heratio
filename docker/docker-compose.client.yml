# =============================================================================
# Heratio - CLIENT install stack
#
# Pulls the prebuilt image from GitHub Container Registry. No git clone,
# no local build, no Dockerfile required. Use this for production demos,
# customer evaluations, support replicas, and any "I just want it running"
# scenario.
#
# Pin to a version tag in production:
#   HERATIO_VERSION=v1.41.3
# or use 'latest' for the most recent release.
#
# AI is INTENTIONALLY external. The Heratio image contains zero model
# weights or AI runtimes. To enable AI features, point the relevant
# *_url settings (e.g. voice_local_llm_url) at your separate Ollama / vLLM
# host inside Heratio's Settings dashboard after first login.
#
# Quick start:
#   curl -fsSL https://raw.githubusercontent.com/ArchiveHeritageGroup/heratio/main/docker/install-heratio.sh | bash
#
# Or manually:
#   curl -fL -o docker-compose.yml https://raw.githubusercontent.com/ArchiveHeritageGroup/heratio/main/docker/docker-compose.client.yml
#   curl -fL -o .env.docker        https://raw.githubusercontent.com/ArchiveHeritageGroup/heratio/main/docker/.env.docker.example
#   nano .env.docker   # set ADMIN_PASSWORD
#   docker compose --env-file .env.docker pull
#   docker compose --env-file .env.docker up -d
#
# @copyright  Johan Pieterse / Plain Sailing
# @license    AGPL-3.0-or-later
# =============================================================================

name: heratio

services:
  heratio:
    image: ghcr.io/archiveheritagegroup/heratio:${HERATIO_VERSION:-latest}
    container_name: heratio-app
    pull_policy: always
    depends_on:
      mysql:        { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    environment:
      APP_ENV:                 ${APP_ENV:-production}
      APP_DEBUG:               ${APP_DEBUG:-false}
      APP_URL:                 ${APP_URL:-http://localhost:8088}
      DB_CONNECTION:           mysql
      DB_HOST:                 mysql
      DB_PORT:                 3306
      DB_DATABASE:             ${DB_DATABASE:-heratio}
      DB_USERNAME:             ${DB_USERNAME:-heratio}
      DB_PASSWORD:             ${DB_PASSWORD:?DB_PASSWORD must be set in .env.docker}
      ELASTICSEARCH_HOST:      http://elasticsearch:9200
      ELASTICSEARCH_PREFIX:    heratio_
      HERATIO_STORAGE_PATH:    /var/www/heratio/storage/uploads
      HERATIO_UPLOADS_PATH:    /var/www/heratio/storage/uploads
      HERATIO_BACKUPS_PATH:    /var/www/heratio/storage/backups
      ADMIN_EMAIL:             ${ADMIN_EMAIL:?ADMIN_EMAIL must be set in .env.docker}
      ADMIN_PASSWORD:          ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env.docker}
    ports:
      - "${HERATIO_PORT:-8088}:80"
    volumes:
      - heratio-storage:/var/www/heratio/storage/uploads
      - heratio-backups:/var/www/heratio/storage/backups
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: heratio-mysql
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-heratio}
      MYSQL_USER:          ${DB_USERNAME:-heratio}
      MYSQL_PASSWORD:      ${DB_PASSWORD:?DB_PASSWORD must be set in .env.docker}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set in .env.docker}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=512M
    volumes:
      - heratio-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: heratio-es
    environment:
      discovery.type:            single-node
      xpack.security.enabled:    'false'
      ES_JAVA_OPTS:              '-Xms512m -Xmx512m'
      cluster.routing.allocation.disk.threshold_enabled: 'false'
    volumes:
      - heratio-es:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

volumes:
  heratio-storage:
  heratio-backups:
  heratio-mysql:
  heratio-es:
