; Reuse the base image's default pool name ([www]) instead of defining a second
; pool. A differently-named pool on the same 127.0.0.1:9000 collides with the
; base www pool ("Address already in use"); using [www] simply overrides its
; settings, leaving exactly one pool.
[www]
listen = 127.0.0.1:9000
user   = www-data
group  = www-data

; Modest pool — single test instance, not a production peak
pm                       = dynamic
pm.max_children          = 10
pm.start_servers         = 2
pm.min_spare_servers     = 1
pm.max_spare_servers     = 3
pm.max_requests          = 500

catch_workers_output     = yes
decorate_workers_output  = no
clear_env                = no
